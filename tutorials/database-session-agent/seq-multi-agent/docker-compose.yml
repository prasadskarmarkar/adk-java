version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: adk_stats_postgres
    environment:
      POSTGRES_DB: adk_sessions
      POSTGRES_USER: adk
      POSTGRES_PASSWORD: adk123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adk -d adk_sessions"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
