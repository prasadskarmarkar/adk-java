version: '3.8'

services:
  mysql-test:
    image: mysql:8.0
    container_name: adk-mysql-test
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: adk_test
      MYSQL_USER: adk_user
      MYSQL_PASSWORD: adk_password
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - mysql-test-data:/var/lib/mysql

  postgres-test:
    image: postgres:16
    container_name: adk-postgres-test
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: adk_user
      POSTGRES_PASSWORD: adk_password
      POSTGRES_DB: adk_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adk_user -d adk_test"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-test-data:/var/lib/postgresql/data

volumes:
  mysql-test-data:
  postgres-test-data:
